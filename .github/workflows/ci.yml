name: CI

on:
  push:
  pull_request:

jobs:
  offline-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run validate:profile
      - name: Audit committed safe fixture
        run: npx tsx src/planner/snapshotAudit.ts test/fixtures/snapshot
